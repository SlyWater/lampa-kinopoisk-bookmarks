name: Deploy server

on:
  push:
    branches:
      - main
    paths:
      - worker/**
      - deploy/**
      - package.json
      - .github/workflows/deploy-server.yml
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SERVER_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Pull and restart service
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR || '/opt/lampa-kinopoisk-bookmarks' }}
          SERVER_SERVICE: ${{ secrets.SERVER_SERVICE || 'lampa-kp' }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "set -euo pipefail
             cd '$SERVER_APP_DIR'
             git pull --ff-only origin main
             sudo systemctl restart '$SERVER_SERVICE'
             sudo systemctl is-active --quiet '$SERVER_SERVICE'"
